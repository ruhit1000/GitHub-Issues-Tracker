<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- DaisyUI and Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <section>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="flex-1">
                    <a class="btn btn-ghost text-2xl"><span><img class="w-9" src="./assets/github-logo.png"
                                alt=""></span>GitHub Issues Tracker</a>
                </div>
                <div class="flex gap-2">
                    <label class="input input-bordered flex items-center gap-2 w-24 md:w-auto">
                        <i class="fa-solid fa-magnifying-glass opacity-70"></i>
                        <input type="text" placeholder="Search issues..." class="grow" />
                    </label>

                    <button class="btn btn-primary">Search</button>
                </div>
            </div>
        </section>
    </header>

    <main class="bg-[#F8FAFC] py-14">
        <section id="section-buttons" class="bg-white p-6 rounded-lg container mx-auto mb-4 shadow">
            <button onclick="loadAllIssues()" class="btn btn-outline btn-active btn-primary w-[120px]">All</button>
            <button class="btn btn-outline btn-primary w-[120px]">Open</button>
            <button class="btn btn-outline btn-primary w-[120px]">Closed</button>
        </section>

        <section class="bg-white rounded-lg container mx-auto shadow">
            <div class="flex justify-between items-center p-6 border-b-2 border-gray-200">
                <div class="flex gap-2">
                    <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex justify-center items-center">
                        <img class="" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-semibold text-xl"><span id="total-issues-counter">0</span> Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex gap-2 items-center">
                        <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                        <p class="font-medium">Closed</p>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
            <div id="loading-spinner" class="flex justify-center items-center p-6 hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>
    </main>

    <script src="./script/machine.js"></script>
    <script src="./script/home.js"></script>
</body>

</html>
